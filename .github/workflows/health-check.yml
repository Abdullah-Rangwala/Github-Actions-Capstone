name: Scheduled Health Check

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest

    steps:

      - name: Pull latest Docker image
        run: docker pull ${{ secrets.DOCKER_USERNAME }}/flask-capstone:latest

      - name: Run container
        run: |
          docker run -d -p 5000:5000 --name health-test \
          ${{ secrets.DOCKER_USERNAME }}/flask-capstone:latest

      - name: Wait for container to start
        run: sleep 5

      - name: Health check
        id: health
        run: |
          if curl -f http://localhost:5000/health; then
            echo "status=PASSED" >> $GITHUB_OUTPUT
            echo "Health check passed"
          else
            echo "status=FAILED" >> $GITHUB_OUTPUT
            echo "Health check failed"
          fi

      - name: Stop container
        run: |
          docker stop health-test
          docker rm health-test

      - name: Write summary
        run: |
          echo "## Health Check Report" >> $GITHUB_STEP_SUMMARY
          echo "- Image: ${{ secrets.DOCKER_USERNAME }}/flask-capstone:latest" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ steps.health.outputs.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- Time: $(date)" >> $GITHUB_STEP_SUMMARY